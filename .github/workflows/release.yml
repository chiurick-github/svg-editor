name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Auto Release
    runs-on: macos-latest
    timeout-minutes: 30

    # Only release when tests pass and it's an actual code change (not just docs)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'svg-editor/package-lock.json'

      - name: Install dependencies
        working-directory: svg-editor
        run: npm ci

      - name: Run Tests
        working-directory: svg-editor
        run: npm test

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version & Generate Changelog
        working-directory: svg-editor
        run: |
          npx standard-version --no-verify
          git push --follow-tags origin main

      - name: Build Electron App
        working-directory: svg-editor
        run: npm run build

      - name: Package macOS DMG
        working-directory: svg-editor
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version
        id: version
        working-directory: svg-editor
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SVG Editor v${{ steps.version.outputs.version }}
          body_path: svg-editor/CHANGELOG.md
          files: svg-editor/dist/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "## 🚀 Release v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | v${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS DMG | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ✅ Published |" >> $GITHUB_STEP_SUMMARY
