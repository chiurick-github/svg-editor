name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'svg-editor/package-lock.json'

      - name: Install dependencies
        working-directory: svg-editor
        run: npm ci

      - name: Lint
        working-directory: svg-editor
        run: npm run lint
        continue-on-error: true

      - name: Unit Tests
        working-directory: svg-editor
        run: npm run test:unit

      - name: Integration Tests
        working-directory: svg-editor
        run: npm run test:integration

      - name: Full Test Suite with Coverage
        working-directory: svg-editor
        run: npm run test:coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: svg-editor/coverage/
          retention-days: 14

      - name: Build Check
        working-directory: svg-editor
        run: npm run build

  build-check:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'svg-editor/package-lock.json'

      - name: Install dependencies
        working-directory: svg-editor
        run: npm ci

      - name: Build Electron App
        working-directory: svg-editor
        run: npm run build

      - name: Package macOS DMG
        working-directory: svg-editor
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: svg-editor-mac
          path: svg-editor/dist/*.dmg
          retention-days: 7
