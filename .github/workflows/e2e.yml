name: E2E Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: Electron E2E
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build Electron App
        run: npm run build

      - name: Run E2E Tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload E2E Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: E2E Summary
        if: always()
        run: |
          echo "## 🧪 E2E Test Results" >> $GITHUB_STEP_SUMMARY
          if [ $? -eq 0 ]; then
            echo "✅ All E2E tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some E2E tests failed — see artifacts" >> $GITHUB_STEP_SUMMARY
          fi
